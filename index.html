<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Watchlist</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="login-screen" class="container">
        <h1 class="login-title">Welcome to Crypto Watchlist</h1>
        <div class="add-coin-section login-box">
            <h3>Access Your Portfolio</h3>

            <input type="text" id="username-input" class="full-width-input" placeholder="Username">
            <input type="password" id="password-input" class="full-width-input mb-20" placeholder="Password">

            <div class="button-group">
                <button id="login-btn" class="auth-btn login-color">Log In</button>
                <button id="signup-btn" class="auth-btn signup-color">Sign Up</button>
            </div>

            <p id="login-message" class="status-message"></p>
        </div>
    </div>

    <div id="dashboard-screen" class="container hidden">
        <div class="dashboard-header">
            <h1>My Live Crypto Portfolio</h1>
            <button id="logout-btn" class="cancel-btn">Log Out</button>
        </div>

        <h2 id="net-worth-display" class="net-worth-title">
            Total Net Worth: $0.00
        </h2>

        <div class="add-coin-section">
            <h3>Manage Portfolio</h3>

            <div class="input-group">
                <input type="text" id="new-coin-input" placeholder="e.g. bitcoin">
                <input type="number" id="new-amount-input" class="amount-input" placeholder="Amount (e.g. 0.5)"
                    step="0.01">
            </div>

            <button id="add-coin-btn">Save Coin</button>
            <button id="open-delete-modal-btn" class="danger-btn">Remove a Coin</button>
            <p id="add-coin-message" class="status-message"></p>
        </div>

        <div id="portfolio-container">
            <p>Loading your coins...</p>
        </div>
    </div>

    <div id="chart-modal" class="modal-overlay hidden">
        <div class="modal-content chart-modal-content">
            <h3 id="chart-title" class="chart-title">Loading Chart...</h3>
            <canvas id="priceChart"></canvas>
            <div class="modal-actions chart-actions">
                <button id="close-chart-btn" class="cancel-btn">Close</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Select a Coin to Remove</h3>
            <select id="delete-coin-select">
            </select>
            <div class="modal-actions">
                <button id="confirm-delete-btn" class="danger-btn">Delete</button>
                <button id="cancel-delete-btn" class="cancel-btn">Cancel</button>
            </div>
            <p id="delete-message" class="status-message"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
