<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Watchlist</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="login-screen" class="container">
        <h1 style="margin-top: 100px;">Welcome to Crypto Watchlist</h1>
        <div class="add-coin-section" style="text-align: center; max-width: 400px; margin: 0 auto;">
            <h3>Enter your Username</h3>
            <input type="text" id="username-input" placeholder="e.g. CryptoKing"
                style="width: 100%; margin-bottom: 20px;">
            <button id="login-btn" class="danger-btn"
                style="background: #38bdf8; color: #0f172a; width: 100%; margin: 0;">Login / Create Account</button>
            <p id="login-message" style="font-weight: bold; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="dashboard-screen" class="container hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>My Live Crypto Portfolio</h1>
            <button id="logout-btn" class="cancel-btn">Log Out</button>
        </div>

        <div class="add-coin-section">
            <h3>Manage Portfolio</h3>
            <input type="text" id="new-coin-input" placeholder="e.g. ethereum, dogecoin">
            <button id="add-coin-btn">Save Coin</button>
            <button id="open-delete-modal-btn" class="danger-btn">Remove a Coin</button>
            <p id="add-coin-message" style="font-weight: bold; margin-top: 10px;"></p>
        </div>

        <div id="portfolio-container">
            <p>Loading your coins...</p>
        </div>
    </div>

    <div id="chart-modal" class="modal-overlay hidden">
        <div class="modal-content" style="width: 700px; max-width: 90vw;">
            <h3 id="chart-title" style="color: #38bdf8;">Loading Chart...</h3>
            <canvas id="priceChart"></canvas>
            <div class="modal-actions" style="margin-top: 20px;">
                <button id="close-chart-btn" class="cancel-btn">Close</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Select a Coin to Remove</h3>
            <select id="delete-coin-select">
            </select>
            <div class="modal-actions">
                <button id="confirm-delete-btn" class="danger-btn">Delete</button>
                <button id="cancel-delete-btn" class="cancel-btn">Cancel</button>
            </div>
            <p id="delete-message" style="font-weight: bold; margin-top: 10px;"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
